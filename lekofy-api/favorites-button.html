<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Favorites Button</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0f1120] flex items-center justify-center gap-6">

  <!-- Обычное состояние -->
  <a
    href="/favorites"
    aria-label="Избранное"
    class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-white/10 text-slate-300 shadow-[0_2px_8px_rgba(0,0,0,0.3)] transition-colors duration-200 hover:bg-white/20 hover:text-rose-400 focus-visible:outline-none focus-visible:bg-rose-500 focus-visible:text-white"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572"/>
    </svg>
  </a>

  <!-- Активное (в избранном) -->
  <a
    href="/favorites"
    aria-label="Избранное"
    class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-white/10 text-rose-500 shadow-[0_2px_8px_rgba(0,0,0,0.3)] transition-colors duration-200 hover:bg-white/20 hover:text-rose-400 focus-visible:outline-none focus-visible:bg-rose-500 focus-visible:text-white"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none">
      <path d="M6.979 3.074a6 6 0 0 1 4.988 1.425l.033 .03l.034 -.03a6 6 0 0 1 4.733 -1.44l.246 .036a6 6 0 0 1 3.364 10.008l-.18 .185l-.048 .041l-7.45 7.379a1 1 0 0 1 -1.313 .082l-.094 -.082l-7.493 -7.422a6 6 0 0 1 .927 -9.215z"/>
    </svg>
  </a>

  <!-- Disabled -->
  <a
    href="/favorites"
    aria-disabled="true"
    tabindex="-1"
    aria-label="Избранное (недоступно)"
    class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-white/10 text-slate-600 shadow-[0_2px_8px_rgba(0,0,0,0.3)] transition-colors duration-200 opacity-40 pointer-events-none cursor-not-allowed"
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572"/>
    </svg>
  </a>

</body>
</html>
